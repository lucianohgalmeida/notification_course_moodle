<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <title>Início de Curso - Educação Paralímpica</title>
</head>
<body style="margin: 0; padding: 0; background-color: #f4f6f9; font-family: Arial, Helvetica, sans-serif; -webkit-text-size-adjust: 100%; -ms-text-size-adjust: 100%;">

  <!-- Wrapper -->
  <table role="presentation" cellpadding="0" cellspacing="0" width="100%" style="border-collapse: collapse; background-color: #f4f6f9;">
    <tr>
      <td align="center" style="padding: 40px 16px;">

        <!-- Email container -->
        <table role="presentation" cellpadding="0" cellspacing="0" width="600" style="max-width: 600px; width: 100%; border-collapse: collapse; background-color: #ffffff; border-radius: 8px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.08);">

          <!-- Header -->
          <tr>
            <td align="center" style="background-color: #2563eb; padding: 32px 40px;">
              <h1 style="margin: 0; color: #ffffff; font-family: Arial, Helvetica, sans-serif; font-size: 22px; font-weight: 700; letter-spacing: 0.5px;">
                Educação Paralímpica
              </h1>
            </td>
          </tr>

          <!-- Body -->
          <tr>
            <td style="padding: 40px 40px 32px 40px;">

              <p style="margin: 0 0 24px 0; font-family: Arial, Helvetica, sans-serif; font-size: 16px; color: #1e293b; line-height: 1.6;">
                Olá, <strong>{nome_aluno}</strong>!
              </p>

              <p style="margin: 0 0 20px 0; font-family: Arial, Helvetica, sans-serif; font-size: 16px; color: #334155; line-height: 1.6;">
                O curso <strong>"{nome_curso}"</strong> tem início em <strong>{data_inicio}</strong>.
              </p>

              <!-- Info box -->
              <table role="presentation" cellpadding="0" cellspacing="0" width="100%" style="border-collapse: collapse; background-color: #eff6ff; border-left: 4px solid #2563eb; border-radius: 4px; margin: 0 0 28px 0;">
                <tr>
                  <td style="padding: 16px 20px;">
                    <p style="margin: 0 0 8px 0; font-family: Arial, Helvetica, sans-serif; font-size: 14px; color: #334155; line-height: 1.5;">
                      <strong style="color: #1e3a8a;">Acesse com seu usuário:</strong>
                    </p>
                    <p style="margin: 0; font-family: Arial, Helvetica, sans-serif; font-size: 15px; color: #1e40af; font-weight: 600;">
                      {login_moodle}
                    </p>
                  </td>
                </tr>
              </table>

              <p style="margin: 0 0 28px 0; font-family: Arial, Helvetica, sans-serif; font-size: 15px; color: #475569; line-height: 1.6;">
                Esqueceu sua senha?
              </p>

              <!-- Button -->
              <table role="presentation" cellpadding="0" cellspacing="0" style="border-collapse: collapse; margin: 0 0 36px 0;">
                <tr>
                  <td align="center" style="border-radius: 6px; background-color: #2563eb;">
                    <a href="{link_esqueci_senha}"
                       target="_blank"
                       style="display: inline-block; padding: 12px 28px; font-family: Arial, Helvetica, sans-serif; font-size: 15px; font-weight: 700; color: #ffffff; text-decoration: none; border-radius: 6px; letter-spacing: 0.3px; mso-padding-alt: 0; text-align: center;">
                      Redefinir minha senha
                    </a>
                  </td>
                </tr>
              </table>

              <p style="margin: 0; font-family: Arial, Helvetica, sans-serif; font-size: 16px; color: #334155; line-height: 1.6;">
                Até lá!
              </p>

            </td>
          </tr>

          <!-- Footer -->
          <tr>
            <td align="center" style="background-color: #f8fafc; border-top: 1px solid #e2e8f0; padding: 24px 40px;">
              <p style="margin: 0 0 4px 0; font-family: Arial, Helvetica, sans-serif; font-size: 14px; font-weight: 700; color: #1e293b;">
                Equipe Educação Paralímpica
              </p>
              <p style="margin: 0; font-family: Arial, Helvetica, sans-serif; font-size: 12px; color: #94a3b8; line-height: 1.5;">
                Este é um e-mail automático. Por favor, não responda diretamente a esta mensagem.
              </p>
            </td>
          </tr>

        </table>
        <!-- /Email container -->

      </td>
    </tr>
  </table>
  <!-- /Wrapper -->

</body>
</html>
